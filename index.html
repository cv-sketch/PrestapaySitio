        <button key={l} onClick={()=>setLang(l)}
          className="mono"
          style={{

            textTransform:"uppercase", fontWeight:600,

            color: lang===l ? "var(--accent-soft)" : "var(--ink-2)",
            transition:"all .2s"

}

            display:"flex", flexDirection:"column", justifyContent:"space-between",
            minHeight:300

            <div className="display" style={{

            <figcaption style={{marginTop:24, display:"flex", alignItems:"center", gap:12}}>

              <div>

                <div className="mono" style={{
                  fontSize:11, textTransform:"uppercase", letterSpacing:"0.1em",

/* ---------------- FAQ ---------------- */
function FAQ({ lang }) {
  const t = COPY[lang].faq;
  const [open, setOpen] = useState(0);
  return (
    <section id="nosotros" style={{padding:"120px 32px", background:"var(--bg-2)"}}>
      <div style={{maxWidth:980, margin:"0 auto"}}>
        <SectionHead kicker={t.kicker} title={t.title} align="center"/>
        <div style={{marginTop:48, borderTop:"1px solid var(--line-2)"}}>
          {t.items.map((q,i)=>(
            <div key={i} style={{borderBottom:"1px solid var(--line-2)"}}>
              <button onClick={()=>setOpen(open===i?-1:i)} style={{
                width:"100%", padding:"24px 0", display:"flex", justifyContent:"space-between",
                alignItems:"center", textAlign:"left", gap:16
              }}>
                <span className="display" style={{fontSize:22}}>{q.q}</span>
                <span style={{
                  width:32, height:32, borderRadius:99, border:"1px solid var(--line-2)",
                  display:"flex", alignItems:"center", justifyContent:"center", flex:"0 0 auto",
                  background: open===i ? "var(--navy)" : "transparent",
                  color: open===i ? "var(--accent)" : "var(--ink)",
                  transition:"all .2s"
                }}>
                  <svg width="14" height="14" viewBox="0 0 14 14" style={{transform: open===i?"rotate(45deg)":"none", transition:"transform .2s"}}>
                    <path d="M7 2v10M2 7h10" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/>
                  </svg>
                </span>
              </button>
              <div style={{
                maxHeight: open===i ? 200 : 0, overflow:"hidden",
                transition:"max-height .35s ease",
              }}>
                <p style={{margin:0, padding:"0 80px 24px 0", fontSize:16, lineHeight:1.6, color:"var(--ink-2)"}}>{q.a}</p>
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

  },[lang]);

  return (
    <div>
      <Nav lang={lang} setLang={setLang}/>
      <Hero lang={lang}/>
      <Pillars lang={lang}/>
      <How lang={lang}/>
      <Education lang={lang}/>
      <Business lang={lang}/>
      <AppSection lang={lang}/>
      <Testimonials lang={lang}/>
      <FAQ lang={lang}/>
      <BigCTA lang={lang}/>
      <Footer lang={lang}/>

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
